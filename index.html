<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Factura Kevin Checa</title>
  <link rel="stylesheet" href="facturaKevin.css" />
</head>
<body>

  <div id="toast" class="toast"></div>

  <div id="toastConfirm" class="toast-confirm">
    <p id="toastConfirmText"></p>
    <div class="toast-buttons">
      <button id="toastBtnYes">SI</button>
      <button id="toastBtnNo">NO</button>
    </div>
  </div>

  <div class="app-container">

    <header class="header-main">
      <h1>KEVIN CHECA</h1>
      <img src="logo-kevin.png" class="logo-kevin" alt="Logo Kevin" />
    </header>

    <section class="card">
      <h2>RAZÓN SOCIAL</h2>
      <div class="inline-2">
        <label>Nombre / Razón social <input id="emisorNombre" type="text" value="Kevin Checa" /></label>
        <label>NIF <input id="emisorNif" type="text" value="21155464H" /></label>
      </div>
      <div class="inline-2">
        <label>Dirección <input id="emisorDireccion" type="text" value="C/ Reyes Católicos nº 1" /></label>
        <label>Localidad <input id="emisorLocalidad" type="text" value="Ólvega (Soria)" /></label>
      </div>
      <div class="inline-3">
        <label>Código Postal <input id="emisorCP" type="text" value="42110" /></label>
        <label>Email <input id="emisorEmail" type="email" value="kevinchecafraile@gmail.com" /></label>
        <label>Fecha factura <input id="fechaFactura" type="date" /></label>
      </div>
      <label>Nº factura <input id="numeroFactura" type="text" readonly /></label>
    </section>

    <section class="card">
      <h2>Datos del cliente</h2>
      <div class="inline-2">
        <label>Nombre / Razón social <input id="clienteNombre" type="text" /></label>
        <label>Email <input id="clienteEmail" type="email" /></label>
      </div>
      <div class="inline-3">
        <label>Dirección <input id="clienteDireccion" type="text" /></label>
        <label>Código Postal <input id="clienteCP" type="text" /></label>
        <label>Localidad <input id="clienteLocalidad" type="text" /></label>
      </div>
      <div class="inline-2">
        <label>Provincia <input id="clienteProvincia" type="text" /></label>
        <label>Teléfono <input id="clienteTelefono" type="tel" /></label>
      </div>
      <div class="inline-2">
        <label>Tipo doc.
          <select id="clienteTipoDoc">
            <option value="DNI">DNI</option>
            <option value="CIF">CIF</option>
            <option value="NIE">NIE</option>
          </select>
        </label>
        <label>Nº doc. <input id="clienteDoc" type="text" /></label>
      </div>
      <button id="btnGuardarCliente" type="button">Guardar cliente</button>
      <label>Clientes guardados <select id="clientesGuardados"></select></label>
      <button id="btnEliminarCliente" type="button">Eliminar cliente</button>
    </section>

    <section class="card">
      <h2>Datos de la sesión</h2>
      <label>Descripción <textarea id="descripcionSesion" rows="2"></textarea></label>
      <div class="inline-3">
        <label>Cantidad <input id="cantidad" type="number" min="1" value="1" /></label>
        <label>Importe (€) <input id="importe" type="number" min="0" step="0.01" /></label>
        <label>Día sesión <input id="diaSesion" type="date" /></label>
      </div>
      <div class="inline-2">
        <label class="check-label"><input id="desplazamientoIncluido" type="checkbox" /> Desplazamiento incluido</label>
        <label>Importe (€) <input id="desplazamientoImporte" type="number" min="0" step="0.01" /></label>
      </div>
      <div class="inline-2">
        <label class="check-label"><input id="alojamientoIncluido" type="checkbox" /> Alojamiento incluido</label>
        <label>Importe (€) <input id="alojamientoImporte" type="number" min="0" step="0.01" /></label>
      </div>
      <div class="inline-2">
        <label>IVA retenido <select id="ivaRetenido"><option value="0">0%</option><option value="4">4%</option><option value="7">7%</option><option value="21">21%</option></select></label>
        <label>IVA aplicado <select id="ivaAplicado"><option value="0">0%</option><option value="10">10%</option><option value="21" selected>21%</option></select></label>
      </div>
      <div class="totales">
        <div><span>Subtotal:</span> <span id="subtotal">0,00 €</span></div>
        <div><span>IVA retenido:</span> <span id="ivaRetenidoImporte">0,00 €</span></div>
        <div><span>IVA:</span> <span id="ivaImporte">0,00 €</span></div>
        <div class="total-line"><span>Total:</span> <span id="total">0,00 €</span></div>
      </div>
    </section>

    <section class="section-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
      <div class="card">
        <h2>Observaciones</h2>
        <textarea id="observaciones" rows="3"></textarea>
      </div>
      <div class="card">
        <h2>Cuenta bancaria</h2>
        <label>Cuenta guardada <select id="cuentasGuardadas"></select></label>
        <label>IBAN <input id="cuentaActual" type="text" /></label>
        <button id="btnGuardarCuenta" type="button">Guardar</button>
        <button id="btnEliminarCuenta" type="button">Eliminar</button>
      </div>
    </section>

    <section class="card agradecimiento">
      <p style="text-align: center; font-weight: bold; color: #22c55e; margin: 5px;">¡KEVIN CHECA AGRADECE SU CONFIANZA!</p>
    </section>

    <section class="acciones" style="display: flex; gap: 8px;">
      <button id="btnRecalcular" style="flex:1">Recalcular</button>
      <button id="btnPDF" style="flex:1">Generar PDF</button>
    </section>

  </div>

  <!-- AREA DE IMPRESION -->
  <div id="print-area"></div>

  <script src="facturaKevin.js"></script>
</body>
</html>
