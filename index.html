<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Generador de Facturas - Kevin Checa</title>
  <link rel="stylesheet" href="facturaKevin.css">
</head>
<body tabindex="-1">

  <div class="app-container">
    <header class="header-main">
      <img src="logo-kevin.png" alt="Logo Kevin" class="logo-kevin">
      <h1>KEVIN CHECA</h1>
    </header>

    <!-- EMISOR -->
    <section class="card">
      <h2>MIS DATOS (EMISOR)</h2>
      <div class="inline-3">
        <label>Nombre / Razón Social <input type="text" id="emisorNombre" value="KEVIN CHECA"></label>
        <label>NIF <input type="text" id="emisorNif" value="21155464-H"></label>
        <label>Dirección <input type="text" id="emisorDireccion" value="C/ Reyes Católicos nº 1"></label>
      </div>
      <div class="inline-3">
        <label>Localidad <input type="text" id="emisorLocalidad" value="Olvega"></label>
        <label>Provincia <input type="text" id="emisorProvincia" value="Soria"></label>
        <label>C.P. <input type="text" id="emisorCP" value="42110"></label>
      </div>

      <!-- Nº FACTURA y FECHA (misma línea) -->
      <div class="inline-2">
        <label style="display:flex;flex-direction:column;gap:8px;">
          Nº Factura
          <div class="input-with-btn">
            <input type="text" id="numeroFactura" placeholder="Ej: 6-2026">
            <button id="btnEditarNumero" type="button" class="edit-num-btn" title="Editar número">✎</button>
          </div>
        </label>

        <label>Fecha Factura
          <input type="date" id="fechaFactura">
        </label>
      </div>
    </section>

    <!-- CLIENTE -->
    <section class="card" id="seccionCliente">
      <h2>DATOS DEL CLIENTE</h2>
      <label>Seleccionar Cliente Guardado
        <select id="clientesGuardados">
          <option value="">Seleccionar cliente...</option>
        </select>
      </label>
      <div class="inline-2">
        <label>Nombre / Razón Social <input type="text" id="clienteNombre"></label>
        <label>Email <input type="email" id="clienteEmail"></label>
      </div>
      <div class="inline-3">
        <label>Dirección <input type="text" id="clienteDireccion"></label>
        <label>C.P. <input type="text" id="clienteCP"></label>
        <label>Localidad <input type="text" id="clienteLocalidad"></label>
      </div>
      <div class="inline-2">
        <label>Provincia <input type="text" id="clienteProvincia"></label>
        <label>Teléfono <input type="text" id="clienteTelefono"></label>
      </div>
      <div class="inline-2">
        <label>Tipo Doc.
          <select id="clienteTipoDoc">
            <option value="DNI">DNI</option>
            <option value="NIE">NIE</option>
            <option value="CIF">CIF</option>
          </select>
        </label>
        <label>Nº Documento <input type="text" id="clienteDoc"></label>
      </div>
      <div class="btn-group-clientes">
        <button id="btnGuardarCliente" class="btn-blue">Guardar/Actualizar Cliente</button>
        <button id="btnEliminarCliente" class="btn-red">Eliminar Cliente</button>
      </div>
    </section>

    <!-- SERVICIO -->
    <section class="card">
      <h2>DETALLES DEL SERVICIO</h2>

      <label>Descripción de la Sesión / Servicio
        <textarea id="descripcionSesion" rows="2"></textarea>
      </label>

      <!-- CONTENEDOR DE LÍNEAS DE SESIÓN (la primera línea usa los IDs originales) -->
      <div id="sessionLines">
        <div class="session-line" data-default="true">
          <div class="inline-3">
            <label>Cantidad
              <select id="cantidad">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </label>
            <label>Importe Unitario (€)
              <input type="number" id="importe" step="0.01" placeholder="0.00">
            </label>
            <label>Día Sesión
              <input type="date" id="diaSesion">
            </label>
          </div>
        </div>
        <!-- nuevas líneas serán añadidas aquí dinámicamente -->
      </div>

      <div class="line-actions" style="display:flex; gap:8px; align-items:center;">
        <button id="btnAgregarSesionManual" class="btn-purple" type="button">+ Añadir sesión</button>
        <small style="color:var(--text-muted); font-size:0.85rem;">Puedes añadir varias sesiones para la misma factura</small>
      </div>

      <div class="inline-3" style="margin-top:8px;">
        <label>IVA Retenido (%)
          <select id="ivaRetenido">
            <option value="0">0%</option>
            <option value="7">7%</option>
            <option value="15">15%</option>
            <option value="19">19%</option>
            <option value="21">21%</option>
          </select>
        </label>
        <label>IVA Aplicado (%)
          <select id="ivaAplicado">
            <option value="0">0%</option>
            <option value="4">4%</option>
            <option value="10" selected>10%</option>
            <option value="21">21%</option>
          </select>
        </label>
        <label>Subtotal
          <span id="subtotal" class="total-display">0,00 €</span>
        </label>
      </div>
      <div class="inline-3">
        <label>IVA Retenido Importe
          <span id="ivaRetenidoImporte" class="total-display">0,00 €</span>
        </label>
        <label>IVA Importe
          <span id="ivaImporte" class="total-display">0,00 €</span>
        </label>
        <label>TOTAL
          <span id="total" class="total-display total-highlight">0,00 €</span>
        </label>
      </div>
      <label class="row-label">
        <input type="checkbox" id="desplazamientoIncluido">
        Incluir desplazamiento
      </label>
      <div id="desplazamientoFields" style="display:none;" class="inline-2">
        <label>Km ida y vuelta <input type="number" id="kmDesplazamiento" step="1" placeholder="0"></label>
        <label>€/km <input type="number" id="precioPorKm" step="0.01" placeholder="0.19"></label>
      </div>
      <label class="row-label">
        <input type="checkbox" id="alojamientoIncluido">
        Incluir alojamiento
      </label>
      <div id="alojamientoFields" style="display:none;">
        <label>Coste alojamiento (€) <input type="number" id="costoAlojamiento" step="0.01" placeholder="0.00"></label>
      </div>
    </section>

    <!-- PAGO -->
    <section class="card">
      <h2>DATOS DE PAGO</h2>
      <label>Cuenta Bancaria Actual (IBAN)
        <input type="text" id="cuentaActual" placeholder="ES00 0000 0000 0000 0000 0000" value="ES76 2100 5731 9402 0016 3635">
      </label>
      <label>Seleccionar Cuenta Guardada
        <select id="cuentasGuardadas">
          <option value="">Seleccionar cuenta...</option>
        </select>
      </label>
      <div class="inline-2">
        <button id="btnGuardarCuenta" class="btn-blue">Guardar Cuenta</button>
        <button id="btnEliminarCuenta" class="btn-red">Eliminar Cuenta</button>
      </div>
    </section>

    <!-- OBSERVACIONES -->
    <section class="card">
      <h2>OBSERVACIONES</h2>
      <label>Notas adicionales
        <textarea id="observaciones" rows="2" placeholder="Observaciones opcionales..."></textarea>
      </label>
    </section>

    <!-- HISTORIAL -->
    <section class="card">
      <h2>GESTIÓN DE DATOS</h2>
      <button id="btnVerHistorial" class="btn-slate">📋 Ver Historial de Facturas</button>
    </section>

    <!-- ACCIONES -->
    <div class="acciones">
      <button id="btnNuevaFacturaFixed" class="btn-purple">🆕 NUEVA FACTURA</button>
      <button id="btnGuardarFactura" class="btn-blue">💾 GUARDAR FACTURA</button>
      <button id="btnPDF" class="btn-orange">🖨️ GENERAR PDF</button>
    </div>
  </div>

  <!-- MODAL HISTORIAL -->
  <div id="modalHistorial" class="modal-historial">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 Historial de Facturas</h2>
        <button id="btnCerrarHistorial" class="btn-cerrar">✕</button>
      </div>
      <div id="listaHistorial" class="lista-historial"></div>
    </div>
  </div>

  <!-- CONFIRM TOAST -->
  <div id="confirmOverlay" class="confirm-overlay">
    <div class="confirm-box">
      <p id="confirmMsg">¿Estás seguro?</p>
      <div class="confirm-btns">
        <button id="confirmSi" class="btn-red">Sí, borrar</button>
        <button id="confirmNo" class="btn-blue">No, cancelar</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="print-area"></div>
  <input type="hidden" id="facturaEditandoIdHidden" value="">

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="facturaKevin.js"></script>
</body>
</html>
