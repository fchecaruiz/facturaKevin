<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Facturas - Kevin Checa</title>
  <link rel="stylesheet" href="facturaKevin.css">
</head>
<body>

  <div class="app-container">
    <!-- CABECERA -->
    <header class="header-main">
      <img src="logo-kevin.png" alt="Logo Kevin" class="logo-kevin">
      <h1>KEVIN CHECA</h1>
    </header>

    <!-- DATOS DEL EMISOR -->
    <section class="card">
      <h2>MIS DATOS (EMISOR)</h2>
      <div class="inline-2">
        <label>Nombre / Razón Social <input type="text" id="emisorNombre" value="KEVIN CHECA"></label>
        <label>NIF <input type="text" id="emisorNif" value="12345678Z"></label>
      </div>
      <div class="inline-3">
        <label>Dirección <input type="text" id="emisorDireccion" value="Calle Ejemplo 123"></label>
        <label>Localidad <input type="text" id="emisorLocalidad" value="Madrid"></label>
        <label>Provincia <input type="text" id="emisorProvincia" value="Madrid"></label>
      </div>
      <div class="inline-3">
        <label>C.P. <input type="text" id="emisorCP" value="28001"></label>
        <label>Email <input type="email" id="emisorEmail" value="kevin@ejemplo.com"></label>
        <label>Fecha Factura <input type="date" id="fechaFactura"></label>
      </div>
      <label>Nº Factura <input type="text" id="numeroFactura" placeholder="Ej: 1-2024"></label>
    </section>

    <!-- DATOS DEL CLIENTE -->
    <section class="card">
      <h2>DATOS DEL CLIENTE</h2>
      <label>Seleccionar Cliente Guardado
        <select id="clientesGuardados"></select>
      </label>
      <div class="inline-2">
        <label>Nombre / Razón Social <input type="text" id="clienteNombre"></label>
        <label>Email <input type="email" id="clienteEmail"></label>
      </div>
      <div class="inline-3">
        <label>Dirección <input type="text" id="clienteDireccion"></label>
        <label>C.P. <input type="text" id="clienteCP"></label>
        <label>Localidad <input type="text" id="clienteLocalidad"></label>
      </div>
      <div class="inline-2">
        <label>Provincia <input type="text" id="clienteProvincia"></label>
        <label>Teléfono <input type="text" id="clienteTelefono"></label>
      </div>
      <div class="inline-2">
        <label>Tipo Doc.
          <select id="clienteTipoDoc">
            <option value="DNI">DNI</option>
            <option value="NIE">NIE</option>
            <option value="CIF">CIF</option>
          </select>
        </label>
        <label>Nº Documento <input type="text" id="clienteDoc"></label>
      </div>
      <div class="inline-2">
        <button id="btnGuardarCliente">Guardar/Actualizar Cliente</button>
        <button id="btnEliminarCliente">Eliminar Cliente Seleccionado</button>
      </div>
    </section>

    <!-- DETALLES DEL SERVICIO -->
    <section class="card">
      <h2>DETALLES DEL SERVICIO</h2>
      <label>Descripción de la Sesión / Servicio
        <textarea id="descripcionSesion" rows="2"></textarea>
      </label>
      <div class="inline-3">
        <label>Cantidad <input type="number" id="cantidad" value="1"></label>
        <label>Importe Unitario (€) <input type="number" id="importe" step="0.01"></label>
        <label>Día de la Sesión <input type="text" id="diaSesion" placeholder="Ej: 15 de Mayo"></label>
      </div>
      <div class="inline-2">
        <label style="flex-direction:row; align-items:center; gap:10px;">
          <input type="checkbox" id="desplazamientoIncluido" style="width:auto;"> Desplazamiento Incluido
        </label>
        <input type="number" id="desplazamientoImporte" placeholder="Importe si no está incluido">
      </div>
      <div class="inline-2">
        <label style="flex-direction:row; align-items:center; gap:10px;">
          <input type="checkbox" id="alojamientoIncluido" style="width:auto;"> Alojamiento Incluido
        </label>
        <input type="number" id="alojamientoImporte" placeholder="Importe si no está incluido">
      </div>
    </section>

    <!-- IMPUESTOS Y TOTALES -->
    <section class="card">
      <h2>IMPUESTOS Y TOTALES</h2>
      <div class="inline-2">
        <label>IVA Retenido (%) <input type="number" id="ivaRetenido" value="0"></label>
        <label>IVA Aplicado (%) <input type="number" id="ivaAplicado" value="21"></label>
      </div>
      <div class="totales">
        <div><span>Subtotal:</span> <span id="subtotal">0,00 €</span></div>
        <div><span>IVA Retenido:</span> <span id="ivaRetenidoImporte">0,00 €</span></div>
        <div><span>IVA:</span> <span id="ivaImporte">0,00 €</span></div>
        <div class="total-line"><span>TOTAL A PAGAR:</span> <span id="total">0,00 €</span></div>
      </div>
    </section>

    <!-- OBSERVACIONES Y CUENTA -->
    <section class="card">
      <h2>OBSERVACIONES Y PAGO</h2>
      <label>Observaciones Adicionales
        <textarea id="observaciones" rows="2"></textarea>
      </label>
      <label style="margin-top:10px;">IBAN de la Cuenta
        <input type="text" id="cuentaActual" placeholder="ES00 0000...">
      </label>
      <label>Cuentas Guardadas
        <select id="cuentasGuardadas"></select>
      </label>
      <div class="inline-2">
        <button id="btnGuardarCuenta">Guardar Cuenta</button>
        <button id="btnEliminarCuenta">Eliminar Cuenta</button>
      </div>
    </section>

    <!-- GESTIÓN DE DATOS -->
    <section class="card">
      <h2>GESTIÓN DE DATOS</h2>
      <div class="inline-2">
        <button id="btnVerHistorial">Ver Historial de Facturas</button>
      </div>
    </section>

    <!-- ACCIONES PRINCIPALES -->
    <div class="acciones">
      <button id="btnNuevaFactura" style="flex:1;">NUEVA FACTURA</button>
      <button id="btnPDF" style="flex:2;">GENERAR PDF / IMPRIMIR</button>
    </div>
  </div>

  <!-- MODAL HISTORIAL -->
  <div id="modalHistorial" class="modal-historial">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Historial de Facturas</h2>
        <button id="btnCerrarHistorial" class="btn-cerrar">&times;</button>
      </div>
      <div id="listaHistorial" class="lista-historial"></div>
    </div>
  </div>

  <!-- TOASTS -->
  <div id="toast" class="toast"></div>
  <div id="toastConfirm" class="toast-confirm">
    <p id="toastConfirmText"></p>
    <div class="toast-buttons">
      <button id="toastBtnYes">SÍ</button>
      <button id="toastBtnNo">NO</button>
    </div>
  </div>

  <!-- ÁREA DE IMPRESIÓN OCULTA -->
  <div id="print-area"></div>

  <script src="facturaKevin.js"></script>
</body>
</html>
