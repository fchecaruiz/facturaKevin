<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Facturas - Kevin Checa</title>
  <link rel="stylesheet" href="facturaKevin.css">
</head>
<body tabindex="-1">

  <div class="app-container">
    <header class="header-main">
      <img src="logo-kevin.png" alt="Logo Kevin" class="logo-kevin">
      <h1>KEVIN CHECA</h1>
    </header>

    <!-- EMISOR -->
    <section class="card">
      <h2>MIS DATOS (EMISOR)</h2>
      <div class="inline-2">
        <label>Nombre / Razón Social <input type="text" id="emisorNombre" value="KEVIN CHECA"></label>
        <label>NIF <input type="text" id="emisorNif" value="21155464-H"></label>
      </div>
      <div class="inline-3">
        <label>Dirección <input type="text" id="emisorDireccion" value="C/ Reyes Católicos nº 1"></label>
        <label>Localidad <input type="text" id="emisorLocalidad" value="Olvega"></label>
        <label>Provincia <input type="text" id="emisorProvincia" value="Soria"></label>
      </div>
      <div class="inline-3">
        <label>C.P. <input type="text" id="emisorCP" value="42110"></label>
        <label>Email <input type="email" id="emisorEmail" value="kevinchecafraile@gmail.com"></label>
        <label>Fecha Factura <input type="date" id="fechaFactura"></label>
      </div>
      <label>Nº Factura <input type="text" id="numeroFactura" placeholder="Ej: 1-2026"></label>
    </section>

    <!-- CLIENTE -->
    <section class="card">
      <h2>DATOS DEL CLIENTE</h2>
      <label>Seleccionar Cliente Guardado
        <select id="clientesGuardados">
          <option value="">Seleccionar cliente...</option>
        </select>
      </label>
      <div class="inline-2">
        <label>Nombre / Razón Social <input type="text" id="clienteNombre"></label>
        <label>Email <input type="email" id="clienteEmail"></label>
      </div>
      <div class="inline-3">
        <label>Dirección <input type="text" id="clienteDireccion"></label>
        <label>C.P. <input type="text" id="clienteCP"></label>
        <label>Localidad <input type="text" id="clienteLocalidad"></label>
      </div>
      <div class="inline-2">
        <label>Provincia <input type="text" id="clienteProvincia"></label>
        <label>Teléfono <input type="text" id="clienteTelefono"></label>
      </div>
      <div class="inline-2">
        <label>Tipo Doc.
          <select id="clienteTipoDoc">
            <option value="DNI">DNI</option>
            <option value="NIE">NIE</option>
            <option value="CIF">CIF</option>
          </select>
        </label>
        <label>Nº Documento <input type="text" id="clienteDoc"></label>
      </div>
      <div class="inline-3">
        <button id="btnNuevaFactura" class="btn-purple">NUEVA FACTURA</button>
        <button id="btnGuardarCliente" class="btn-blue">Guardar/Actualizar Cliente</button>
        <button id="btnEliminarCliente" class="btn-red">Eliminar Cliente</button>
      </div>
    </section>

    <!-- SERVICIO -->
    <section class="card">
      <h2>DETALLES DEL SERVICIO</h2>
      <label>Descripción de la Sesión / Servicio
        <textarea id="descripcionSesion" rows="2"></textarea>
      </label>
      <div class="inline-3">
        <label>Cantidad
          <select id="cantidad">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </label>
        <label>Importe Unitario (€)
          <input type="number" id="importe" step="0.01" placeholder="0.00">
        </label>
        <label>Día de la Sesión
          <input type="text" id="diaSesion" placeholder="Ej: 15-02-2026">
        </label>
      </div>
      <div class="inline-2">
        <label class="row-label">
          <input type="checkbox" id="desplazamientoIncluido"> Desplazamiento Incluido
        </label>
        <input type="number" id="desplazamientoImporte" placeholder="Importe desplazamiento">
      </div>
      <div class="inline-2">
        <label class="row-label">
          <input type="checkbox" id="alojamientoIncluido"> Alojamiento Incluido
        </label>
        <input type="number" id="alojamientoImporte" placeholder="Importe alojamiento">
      </div>
    </section>

    <!-- TOTALES -->
    <section class="card">
      <h2>IMPUESTOS Y TOTALES</h2>
      <div class="inline-2">
        <label>IVA Retenido (%)
          <select id="ivaRetenido">
            <option value="0">0%</option>
            <option value="4">4%</option>
            <option value="7">7%</option>
            <option value="10">10%</option>
          </select>
        </label>
        <label>IVA Aplicado (%)
          <select id="ivaAplicado">
            <option value="4">4%</option>
            <option value="10">10%</option>
            <option value="21" selected>21%</option>
          </select>
        </label>
      </div>
      <div class="totales">
        <div><span>Subtotal:</span> <span id="subtotal">0,00 €</span></div>
        <div><span>IVA Retenido:</span> <span id="ivaRetenidoImporte">0,00 €</span></div>
        <div><span>IVA:</span> <span id="ivaImporte">0,00 €</span></div>
        <div class="total-line"><span>TOTAL A PAGAR:</span> <span id="total">0,00 €</span></div>
      </div>
    </section>

    <!-- PAGO -->
    <section class="card">
      <h2>OBSERVACIONES Y PAGO</h2>
      <label>Observaciones Adicionales
        <textarea id="observaciones" rows="2"></textarea>
      </label>
      <label style="margin-top:10px;">IBAN de la Cuenta
        <input type="text" id="cuentaActual" placeholder="ES00 0000...">
      </label>
      <label>Cuentas Guardadas
        <select id="cuentasGuardadas">
          <option value="">Seleccionar cuenta...</option>
        </select>
      </label>
      <div class="inline-2">
        <button id="btnGuardarCuenta" class="btn-blue">Guardar Cuenta</button>
        <button id="btnEliminarCuenta" class="btn-red">Eliminar Cuenta</button>
      </div>
    </section>

    <!-- HISTORIAL -->
    <section class="card">
      <h2>GESTIÓN DE DATOS</h2>
      <button id="btnVerHistorial" class="btn-slate">📋 Ver Historial de Facturas</button>
    </section>

    <!-- ACCIONES -->
    <div class="acciones">
      <button id="btnGuardarFactura" class="btn-blue">💾 GUARDAR FACTURA</button>
      <button id="btnPDF" class="btn-orange">🖨️ GENERAR PDF / IMPRIMIR</button>
    </div>
  </div>

  <!-- MODAL HISTORIAL -->
  <div id="modalHistorial" class="modal-historial">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 Historial de Facturas</h2>
        <button id="btnCerrarHistorial" class="btn-cerrar">✕</button>
      </div>
      <div id="listaHistorial" class="lista-historial"></div>
    </div>
  </div>

  <!-- CONFIRM TOAST -->
  <div id="confirmOverlay" class="confirm-overlay">
    <div class="confirm-box">
      <p id="confirmMsg">¿Estás seguro?</p>
      <div class="confirm-btns">
        <button id="confirmSi" class="btn-red">Sí, borrar</button>
        <button id="confirmNo" class="btn-blue">No, cancelar</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="print-area"></div>

  <!-- CAMPO OCULTO PARA ID DE FACTURA EN EDICIÓN -->
  <input type="hidden" id="facturaEditandoIdHidden" value="">

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="facturaKevin.js"></script>
</body>
</html>
